meta:
  mode: linear_probe
  freeze_backbone: true
  use_bfloat16: true
  use_grad_checkpoint: false
  copy_data: false
  model_name: vit_base
  patch_size: 4
  feature_mode: avgpool
  head_type: bn_linear
  pretrained_checkpoint: /home/stan/ijepa/tiny_in_200/vitb.64-bs.512-ep.300/jepa-ep201.pth.tar
  pretrained_key: target_encoder
  load_checkpoint: false
  read_checkpoint: null

data:
  batch_size: 128
  eval_batch_size: 128
  num_workers: 16
  pin_mem: true
  root_path: /scratch-shared/stan/ijepa
  image_folder: tiny-imagenet-200
  dataset_backend: imagefolder
  hf_dataset_path: null
  subset_file: null
  crop_size: 64
  eval_resize_size: 64
  train_resize_scale: [0.8, 1.0]
  horizontal_flip_prob: 0.5
  randaugment: false
  drop_last: false
  num_classes: 200

optimization:
  epochs: 50
  lr: 0.01
  weight_decay: 0.0
  momentum: 0.9
  warmup_epochs: 0
  step_decay_epochs: [15, 30, 45]
  step_decay_gamma: 0.1
  label_smoothing: 0.0

logging:
  folder: /scratch-shared/stan/ijepa-runs/tiny_in200/linear-probe/vitb.64-bs.512-ep.200
  write_tag: cls
  checkpoint_freq: 10
