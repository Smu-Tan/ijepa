meta:
  mode: finetune
  freeze_backbone: false
  use_bfloat16: true
  use_grad_checkpoint: false
  copy_data: false
  model_name: vit_huge
  patch_size: 14
  feature_mode: avgpool
  head_type: linear
  pretrained_checkpoint: /home/stan/ijepa/checkpoints/IN1K-vit.h.14-300e.pth.tar
  pretrained_key: target_encoder
  load_checkpoint: false
  read_checkpoint: null

data:
  batch_size: 128
  eval_batch_size: 256
  num_workers: 16
  pin_mem: true
  root_path: /scratch-shared/stan/ijepa
  image_folder: imagenet-1k-imagefolder
  dataset_backend: imagefolder
  hf_dataset_path: null
  subset_file: null
  crop_size: 224
  eval_resize_size: 256
  train_resize_scale: [0.08, 1.0]
  horizontal_flip_prob: 0.5
  randaugment: true
  drop_last: false
  num_classes: 1000

optimization:
  epochs: 50
  lr: 3.0e-5
  min_lr: 1.0e-6
  weight_decay: 4.0e-1
  layer_decay: 0.75
  warmup_epochs: 5
  label_smoothing: 0.1
  mixup_alpha: 0.0
  cutmix_alpha: 0.0
  mixup_prob: 1.0
  clip_grad: null

logging:
  folder: /home/stan/ijepa/imagenet-1k/vith14-finetune
  write_tag: cls
  checkpoint_freq: 5
